name: VPN APK BUILDER DEBUG

on:
  push:
    branches: [ "main", "Main", "Ana" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 1. Checkout Repository
      uses: actions/checkout@v4
    
    - name: 2. Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 3. Setup Gradle Environment
      uses: gradle/actions/setup-gradle@v4

    - name: 4. Fix Gradle Wrapper and Permissions
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: 5. Build APK with Detailed Logs
      run: ./gradlew assembleDebug --stacktrace --info

    - name: 6. Upload Finished APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: My-VPN-App
        path: app/build/outputs/apk/debug/app-debug.apk
